services:
  backend:
    build:
      context: ..
      dockerfile: web_app/backend/Dockerfile
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      HOST: ${BACKEND_HOST:-0.0.0.0}
      PORT: ${BACKEND_PORT:-8000}
      RELOAD: ${BACKEND_RELOAD:-true}
      PYTHONPATH: /app/src:/app/web_app/backend
    command: ["python", "web_app/backend/run.py"]
    volumes:
      - ..:/app
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f\"http://127.0.0.1:{os.environ.get('PORT', '8000')}/api/health\")",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      VITE_DEV_HOST: ${FRONTEND_HOST:-0.0.0.0}
      VITE_DEV_PORT: ${FRONTEND_PORT:-5173}
      VITE_BACKEND_URL: http://backend:${BACKEND_PORT:-8000}
    command:
      [
        "sh",
        "-c",
        "npm run dev -- --host ${FRONTEND_HOST:-0.0.0.0} --port ${FRONTEND_PORT:-5173}",
      ]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
